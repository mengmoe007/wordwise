<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordWise · AI词汇学习</title>
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f7f5f0;
    --card: #ffffff;
    --accent: #4f46e5;
    --accent-light: #eef2ff;
    --green: #059669;
    --green-light: #d1fae5;
    --red: #dc2626;
    --red-light: #fee2e2;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --border: #e5e5e5;
    --muted: #6b7280;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 0;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-weight: 800; font-size: 1.1rem; color: var(--accent); margin-right: 32px; letter-spacing: -0.5px; }
  .nav-tabs { display: flex; gap: 4px; flex: 1; }
  .nav-tab {
    padding: 6px 16px;
    border-radius: 8px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.15s;
  }
  .nav-tab.active { background: var(--accent-light); color: var(--accent); }
  .nav-tab:hover:not(.active) { background: #f3f4f6; }
  .stats-badge {
    font-size: 0.75rem;
    background: var(--accent);
    color: white;
    border-radius: 20px;
    padding: 2px 10px;
    font-weight: 600;
  }

  /* PAGES */
  .page { display: none; padding: 24px; max-width: 760px; margin: 0 auto; }
  .page.active { display: block; }

  /* SETTINGS PAGE */
  .settings-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .settings-card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: var(--ink); }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .form-group select, .form-group textarea, .form-group input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    color: var(--ink);
    background: var(--paper);
    transition: border-color 0.15s;
  }
  .form-group select:focus, .form-group textarea:focus, .form-group input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-group textarea { min-height: 80px; resize: vertical; }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.15s;
  }
  .chip.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .save-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-top: 8px;
  }
  .save-btn:hover { opacity: 0.9; }
  .save-btn:active { opacity: 0.8; }

  /* LOOKUP PAGE */
  .search-box {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .search-row { display: flex; gap: 10px; }
  .search-row input {
    flex: 1;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--ink);
    background: var(--paper);
  }
  .search-row input:focus { outline: none; border-color: var(--accent); }
  .lookup-btn {
    padding: 12px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .lookup-btn:hover { opacity: 0.9; }
  .lookup-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .result-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .result-card.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-word-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .result-word { font-size: 1.8rem; font-weight: 800; color: var(--ink); }
  .speak-btn-inline {
    width: 36px; height: 36px;
    background: var(--accent-light);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .speak-btn-inline:hover { background: var(--accent); color: white; }

  .result-def {
    font-size: 0.95rem;
    line-height: 1.65;
    color: #374151;
    margin-bottom: 20px;
    padding: 14px 16px;
    background: var(--paper);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .action-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .action-btn.primary { background: var(--green); color: white; border-color: var(--green); }
  .action-btn.primary:hover { opacity: 0.9; }
  .action-btn.simplify { background: var(--amber-light); color: var(--amber); border-color: var(--amber); }
  .simplify-label { font-size: 0.72rem; background: var(--amber); color: white; padding: 2px 6px; border-radius: 4px; }

  .loading-dots { display: inline-flex; gap: 4px; }
  .loading-dots span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  /* FLASHCARD PAGE */
  .deck-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .deck-header h2 { font-size: 1.1rem; font-weight: 700; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .flash-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 16px;
    box-shadow: var(--shadow);
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
  }
  .flash-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .flash-card .word { font-size: 1.15rem; font-weight: 800; margin-bottom: 10px; }
  .flash-card .card-speak {
    width: 32px; height: 32px;
    background: var(--accent-light);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    margin: 0 auto 10px;
    transition: background 0.15s;
  }
  .flash-card .card-speak:hover { background: var(--accent); color: white; }
  .flash-card .card-actions { display: flex; gap: 6px; justify-content: center; }
  .card-def-btn {
    font-size: 0.72rem;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }
  .card-def-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .card-def-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--card);
    color: var(--ink);
    padding: 24px;
    border-radius: 16px;
    font-size: 0.95rem;
    line-height: 1.8;
    width: 85%;
    max-width: 500px;
    text-align: left;
    z-index: 100;
    pointer-events: all;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    display: none;
  }
  .card-def-popup.visible { display: block; }
  .card-def-popup-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--border);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .card-def-popup-close:hover { background: var(--accent); }
  .card-def-popup-title {
    font-size: 1.2rem;
    font-weight: 800;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-def-popup-speak {
    width: 36px;
    height: 36px;
    background: var(--accent-light);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: background 0.15s;
  }
  .card-def-popup-speak:hover { background: var(--accent); color: white; }
  .card-def-popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    display: none;
  }
  .card-def-popup-overlay.visible { display: block; }
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  /* QUIZ PAGE */
  .quiz-progress { margin-bottom: 20px; }
  .quiz-progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
  .quiz-stats { display: flex; gap: 16px; margin-top: 10px; }
  .quiz-stat { font-size: 0.8rem; font-weight: 600; }
  .quiz-stat.know { color: var(--green); }
  .quiz-stat.dontknow { color: var(--red); }
  .quiz-stat.remaining { color: var(--muted); }

  .quiz-card-wrap { perspective: 1000px; margin-bottom: 24px; }
  .quiz-card {
    background: var(--card);
    border-radius: 16px;
    padding: 48px 32px;
    box-shadow: var(--shadow);
    text-align: center;
    min-height: 240px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  .quiz-word { font-size: 2.4rem; font-weight: 900; letter-spacing: -1px; }
  .quiz-speak {
    width: 44px; height: 44px;
    background: var(--accent-light);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.3rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .quiz-speak:hover { background: var(--accent); color: white; }
  .quiz-def-area {
    background: var(--paper);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 0.9rem;
    line-height: 1.6;
    text-align: left;
    color: #374151;
    width: 100%;
    border-left: 3px solid var(--accent);
    display: none;
    animation: fadeIn 0.25s ease;
  }
  .quiz-def-area.visible { display: block; }
  .show-def-btn {
    padding: 8px 20px;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    background: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.15s;
  }
  .show-def-btn:hover { background: var(--accent-light); }

  .quiz-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .quiz-btn {
    padding: 14px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 700;
    transition: all 0.15s;
  }
  .quiz-btn.know { background: var(--green-light); color: var(--green); }
  .quiz-btn.know:hover { background: var(--green); color: white; }
  .quiz-btn.dontknow { background: var(--red-light); color: var(--red); }
  .quiz-btn.dontknow:hover { background: var(--red); color: white; }

  .quiz-done {
    background: var(--card);
    border-radius: var(--radius);
    padding: 40px 24px;
    box-shadow: var(--shadow);
    text-align: center;
    display: none;
  }
  .quiz-done.visible { display: block; }
  .quiz-done .big-emoji { font-size: 3rem; margin-bottom: 12px; }
  .quiz-done h3 { font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
  .quiz-done p { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
  .restart-btn {
    padding: 12px 28px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
    transition: opacity 0.15s;
  }
  .restart-btn:hover { opacity: 0.9; }

  .mastered-banner {
    background: var(--green-light);
    border: 1.5px solid var(--green);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.85rem;
    color: var(--green);
    font-weight: 600;
    margin-bottom: 20px;
    display: none;
  }
  .mastered-banner.visible { display: block; }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 0.85rem;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .section-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; color: var(--muted); margin-bottom: 12px; }

  @media (max-width: 500px) {
    nav { padding: 0 12px; }
    .logo { margin-right: 12px; font-size: 1rem; }
    .nav-tab { padding: 6px 10px; font-size: 0.8rem; }
    .page { padding: 16px; }
    .quiz-word { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">WordWise</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('settings')">⚙️ 设置</button>
    <button class="nav-tab" onclick="switchPage('lookup')">🔍 查词</button>
    <button class="nav-tab" onclick="switchPage('cards')">📚 词卡</button>
    <button class="nav-tab" onclick="switchPage('quiz')">🧠 测试</button>
  </div>
  <span class="stats-badge" id="cardCount">0</span>
</nav>

<!-- SETTINGS PAGE -->
<div class="page active" id="page-settings">
  <div class="settings-card">
    <h2>🌐 界面语言</h2>
    <div class="form-group">
      <label>选择界面语言</label>
      <div class="chip-row" id="uiLangChips">
        <button class="chip selected" data-val="zh">中文</button>
        <button class="chip" data-val="ja">日本語</button>
        <button class="chip" data-val="ko">한국어</button>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <h2>🌍 用户英语水平</h2>
    <div class="form-group">
      <label>用文字描述你的英语水平</label>
      <textarea id="levelDesc" placeholder="例如：我是5岁儿童，请用最简单的词。或者：我是成人学习者，可以理解中等难度的内容。"></textarea>
    </div>
    <div class="form-group">
      <label>翻译目标语言</label>
      <div class="chip-row" id="langChips">
        <button class="chip selected" data-val="zh">中文解释</button>
        <button class="chip" data-val="en">用英文解释（English only）</button>
        <button class="chip" data-val="both">中英双语</button>
      </div>
    </div>
    <div class="form-group">
      <label>额外要求（可选）</label>
      <textarea id="extraInstructions" placeholder="例如：请用简单句子，多举日常生活例子，避免专业术语..."></textarea>
    </div>
    <button class="save-btn" onclick="saveSettings()">✅ 保存设置</button>
  </div>

  <div class="settings-card">
    <h2>🔑 API 配置</h2>
    <div class="form-group">
      <label>选择 API 提供商</label>
      <div class="chip-row" id="apiProviderChips">
        <button class="chip selected" data-val="anthropic">Anthropic Claude</button>
        <button class="chip" data-val="openai">OpenAI ChatGPT</button>
      </div>
    </div>
    <div class="form-group">
      <label id="apiKeyLabel">Anthropic API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." />
    </div>
    <button class="save-btn" onclick="saveApiKey()">💾 保存 API Key</button>
    <p style="font-size:0.78rem;color:var(--muted);margin-top:10px;">
      <span id="apiHelpText">Anthropic Key 获取：前往 <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent)">console.anthropic.com</a> 注册。</span>
    </p>
  </div>

  <div class="settings-card">
    <h2>💾 数据存储说明</h2>
    <p style="font-size:0.9rem;line-height:1.6;color:#374151;margin-bottom:16px;">
      <strong>✅ 不需要登录。</strong>所有词卡、设置、学习进度都保存在<strong>你的浏览器本地</strong>。
    </p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <button class="save-btn" style="background:var(--green);margin:0;" onclick="exportData()">📥 导出备份</button>
      <button class="save-btn" style="background:var(--amber);margin:0;" onclick="importData()">📤 恢复备份</button>
    </div>
  </div>
</div>

<!-- LOOKUP PAGE -->
<div class="page" id="page-lookup">
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="wordInput" placeholder="输入英文单词..." onkeydown="if(event.key==='Enter')lookupWord()" />
      <button class="lookup-btn" id="lookupBtn" onclick="lookupWord()">翻译</button>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-word-row">
      <div class="result-word" id="resultWord"></div>
      <button class="speak-btn-inline" onclick="speakWord(document.getElementById('resultWord').textContent)" title="朗读">🔊</button>
    </div>
    <p style="font-size:0.75rem;color:var(--muted);margin-bottom:8px;">💾 这是最终翻译，会被保存到词卡库</p>
    <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:20px;">
      <div class="result-def" id="resultDef" style="flex:1;margin:0;"></div>
      <button class="speak-btn-inline" onclick="speakDefinition(document.getElementById('resultDef').textContent)" title="朗读解释" style="flex-shrink:0;margin-top:2px;">🔊</button>
    </div>
    <div class="result-actions">
      <button class="action-btn simplify" onclick="simplifyDef()">
        <span class="simplify-label">AI</span> 说得更简单
      </button>
      <button class="action-btn primary" onclick="saveCard()">📚 保存为词卡</button>
    </div>
  </div>
</div>

<!-- FLASHCARDS PAGE -->
<div class="page" id="page-cards">
  <div class="deck-header">
    <h2>我的词卡库</h2>
    <button class="action-btn" onclick="switchPage('quiz')">🧠 开始测试</button>
  </div>
  <div class="card-grid" id="cardGrid"></div>
  <div class="empty-state" id="cardEmpty" style="display:none">
    <div class="icon">📭</div>
    <p>还没有词卡<br>去查词页面搜索单词并保存吧！</p>
  </div>
</div>

<!-- QUIZ PAGE -->
<div class="page" id="page-quiz">
  <div class="mastered-banner" id="masteredBanner"></div>

  <div id="quizMain">
    <div class="quiz-progress">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="quizProgressFill" style="width:0%"></div>
      </div>
      <div class="quiz-stats">

function t(key) {
  return i18n[settings.uiLang]?.[key] || i18n.zh[key] || key;
}

function updateUILanguage() {
  // 更新导航栏
  document.querySelectorAll('.nav-tab').forEach(tab => {
    const onclick = tab.getAttribute('onclick');
    if (onclick.includes('settings')) tab.textContent = t('settings');
    else if (onclick.includes('lookup')) tab.textContent = t('lookup');
    else if (onclick.includes('cards')) tab.textContent = t('cards');
    else if (onclick.includes('quiz')) tab.textContent = t('quiz');
  });
}
let settings = {
  levelDesc: '我是5岁儿童水平的学习者',
  lang: 'zh',
  extra: '',
  apiProvider: 'anthropic',
  uiLang: 'zh' // 'zh', 'ja', 'ko'
};
let apiKey = '';
let cards = []; // { id, word, definition, addedAt, masteredCount, lastSeen, nextDue, known, history }
let quizQueue = [];
let quizIdx = 0;
let quizKnow = 0;
let quizDontknow = 0;
let currentWord = '';
let currentDef = '';
let defVisible = false;

// ============ EXPORT / IMPORT ============
function exportData() {
  const allData = {
    version: '1.0',
    exportDate: new Date().toISOString(),
    settings: settings,
    cards: cards
  };
  const json = JSON.stringify(allData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wordwise-backup-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ 备份已下载');
}

function importData() {
  document.getElementById('importFile').click();
}

function handleImportFile() {
  const file = document.getElementById('importFile').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.cards || !data.settings) {
        showToast('❌ 文件格式错误');
        return;
      }
      settings = data.settings || settings;
      cards = data.cards || [];
      saveSettings();
      saveCards();
      updateCardCount();
      applySettingsUI();
      showToast('✅ 数据已恢复');
    } catch(err) {
      showToast('❌ 导入失败：' + err.message);
    }
  };
  reader.readAsText(file);
  document.getElementById('importFile').value = '';
}

// ============ INIT ============
function init() {
  const saved = localStorage.getItem('wordwise_settings');
  if (saved) settings = JSON.parse(saved);
  const savedKey = localStorage.getItem('wordwise_apikey');
  if (savedKey) { apiKey = savedKey; document.getElementById('apiKey').value = savedKey; }
  const savedCards = localStorage.getItem('wordwise_cards');
  if (savedCards) cards = JSON.parse(savedCards);

  applySettingsUI();
  updateCardCount();
  updateUILanguage();
}

function applySettingsUI() {
  document.querySelectorAll('#apiProviderChips .chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.val === settings.apiProvider);
  });
  document.querySelectorAll('#langChips .chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.val === settings.lang);
  });
  document.querySelectorAll('#uiLangChips .chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.val === settings.uiLang);
  });
  document.getElementById('levelDesc').value = settings.levelDesc || '';
  document.getElementById('extraInstructions').value = settings.extra || '';
  updateApiKeyLabel();
}

// ============ NAV ============
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => {
    if (t.getAttribute('onclick').includes("'" + name + "'")) t.classList.add('active');
  });
  if (name === 'cards') renderCards();
  if (name === 'quiz') startQuiz();
}

function updateApiKeyLabel() {

    label.textContent = 'OpenAI API Key';

// ============ SETTINGS ============
function saveSettings() {
  settings.levelDesc = document.getElementById('levelDesc').value.trim();
  settings.extra = document.getElementById('extraInstructions').value.trim();
  localStorage.setItem('wordwise_settings', JSON.stringify(settings));
  showToast('设置已保存 ✅');
}
function saveApiKey() {
  apiKey = document.getElementById('apiKey').value.trim();
  localStorage.setItem('wordwise_apikey', apiKey);
  showToast('API Key 已保存 ✅');
}

// ============ LEVEL → PROMPT ============
function levelPrompt() {
  const levelPart = `User's English level: ${settings.levelDesc || '我是5岁儿童水平的学习者'}`;
  const langs = {
    zh: 'Respond in Chinese (Mandarin). The explanation should be fully in Chinese.',
    en: 'Respond entirely in English. Do not use any Chinese.',
    both: 'Respond in both Chinese and English. First give the Chinese explanation, then give a brief English version.'
  };
  return `${levelPart}. ${langs[settings.lang] || langs.zh}${settings.extra ? ' Additional instructions: ' + settings.extra : ''}`;
}

// ============ LOOKUP ============
async function lookupWord() {
  const word = document.getElementById('wordInput').value.trim();
  if (!word) { showToast('请输入单词'); return; }
  if (!apiKey) { showToast('请先在设置页面填写 API Key'); return; }

  currentWord = word;
  const btn = document.getElementById('lookupBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';

  const resultCard = document.getElementById('resultCard');
  resultCard.classList.remove('visible');

  const prompt = `${levelPrompt()}

Please explain the English word: "${word}"

Include:
1. What it means (main definition)
2. One simple example sentence
3. If relevant, any important usage notes

Keep the response concise and appropriate for the level specified.`;

  try {
    const def = await callClaude(prompt);
    currentDef = def;
    document.getElementById('resultWord').textContent = word;
    document.getElementById('resultDef').textContent = def;
    resultCard.classList.add('visible');
  } catch(e) {
    showToast('翻译失败：' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '翻译';
}

async function simplifyDef() {
  if (!currentDef) return;
  const defEl = document.getElementById('resultDef');
  defEl.textContent = '简化中...';

  const prompt = `${levelPrompt()}

Please take the following explanation and make it EVEN SIMPLER and easier to understand. Use shorter sentences and more basic words:

"${currentDef}"

Rewrite it for someone who found the previous explanation too hard.`;

  try {
    const simpler = await callClaude(prompt);
    currentDef = simpler;
    defEl.textContent = simpler;
    showToast('已简化 ✅');
  } catch(e) {
    defEl.textContent = currentDef;
    showToast('简化失败');
  }
}

// ============ CARDS ============
function saveCard() {
  if (!currentWord || !currentDef) return;
  const existing = cards.find(c => c.word.toLowerCase() === currentWord.toLowerCase());
  if (existing) { showToast('这个词已经在词卡里了！'); return; }

  const card = {
    id: Date.now(),
    word: currentWord,
    definition: currentDef,
    addedAt: Date.now(),
    masteredCount: 0,        // consecutive "know" streak
    lastSeen: null,
    nextDue: Date.now(),     // due now by default
    history: []              // ['know'|'dontknow', ...]
  };
  cards.push(card);
  saveCards();
  updateCardCount();
  showToast('词卡已保存 📚');
}

function saveCards() {
  localStorage.setItem('wordwise_cards', JSON.stringify(cards));
}

function updateCardCount() {
  document.getElementById('cardCount').textContent = cards.length;
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('cardEmpty');
  if (cards.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  // Sort by addedAt descending (newest first)
  const sorted = [...cards].sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
  grid.innerHTML = sorted.map((card, idx) => {
    const date = card.addedAt ? new Date(card.addedAt).toLocaleDateString('zh-CN') : '未知';
    return `
    <div class="flash-card">
      <div class="word">${card.word}</div>
      <div style="font-size:0.7rem;color:var(--muted);margin-bottom:8px;">${date}</div>
      <button class="card-speak" onclick="speakWord('${card.word.replace(/'/g,"\\'")}');event.stopPropagation();">🔊</button>
      <div class="card-actions">
        <button class="card-def-btn" onclick="showCardDef(${card.id}, '${card.word.replace(/'/g,"\\'")}', \`${card.definition.replace(/`/g, '\\`')}\`);event.stopPropagation();">查看</button>
        <button class="card-def-btn" style="color:var(--red)" onclick="deleteCard(${card.id});event.stopPropagation();">🗑</button>
      </div>
      ${card.masteredCount >= 5 ? '<div style="font-size:0.7rem;color:var(--green);font-weight:700;margin-top:6px;">⭐ 已掌握</div>' : ''}
    </div>
  `}).join('');
}

  document.querySelectorAll('.card-def-popup-overlay').forEach(o => o.remove());
  document.querySelectorAll('.card-def-popup').forEach(m => {
    if (m.style && m.style.position === 'fixed') m.remove();
  });
}

function deleteCard(id) {
  cards = cards.filter(c => c.id !== id);
  saveCards();
  updateCardCount();
  renderCards();
  showToast('词卡已删除');
}

// ============ QUIZ ============
// Spaced repetition intervals (in days after 5 consecutive knows):
// Day 1, 3, 5, 9, 15 → differences: 0, 2, 2, 4, 6
const SRS_INTERVALS = [0, 2, 2, 4, 6]; // days after each mastered review

function getCardsDueForQuiz() {
  const now = Date.now();
  return cards.filter(card => {
    // If already fully mastered (5+ consecutive and scheduled into SRS), check nextDue
    if (card.masteredCount >= 5) {
      return card.nextDue <= now;
    }
    // Otherwise always eligible
    return true;
  });
}

function startQuiz() {
  const due = getCardsDueForQuiz();
  if (due.length === 0) {
    document.getElementById('quizMain').style.display = 'none';
    document.getElementById('quizDone').classList.add('visible');
    document.getElementById('quizDoneEmoji').textContent = cards.length === 0 ? '📭' : '🏆';
    document.getElementById('quizDoneTitle').textContent = cards.length === 0 ? '没有词卡' : '全部掌握！';
    document.getElementById('quizDoneText').textContent = cards.length === 0
      ? '先去查词页面添加一些单词吧！'
      : '所有到期词卡已复习完成，今天可以休息啦！';
    return;
  }

  // Shuffle
  quizQueue = [...due].sort(() => Math.random() - 0.5);
  quizIdx = 0;
  quizKnow = 0;
  quizDontknow = 0;

  document.getElementById('quizMain').style.display = 'block';
  document.getElementById('quizDone').classList.remove('visible');
  document.getElementById('masteredBanner').classList.remove('visible');

  showQuizCard();
  updateQuizStats();
}

function showQuizCard() {
  if (quizIdx >= quizQueue.length) {
    endQuiz();
    return;
  }
  const card = quizQueue[quizIdx];
  document.getElementById('quizWord').textContent = card.word;
  document.getElementById('quizDef').textContent = card.definition;
  document.getElementById('quizDef').classList.remove('visible');
  document.getElementById('quizCard').style.animation = 'none';
  void document.getElementById('quizCard').offsetWidth;
  document.getElementById('quizCard').style.animation = '';
  updateQuizStats();
}

function showQuizDef() {
  const defArea = document.getElementById('quizDef');
  const speakBtn = document.getElementById('quizDefSpeak');
  defArea.classList.add('visible');
  speakBtn.style.display = 'flex';
}

function quizAnswer(knows) {
  if (quizIdx >= quizQueue.length) return;
  const card = quizQueue[quizIdx];
  const cardRef = cards.find(c => c.id === card.id);
  if (!cardRef) { quizIdx++; showQuizCard(); return; }

  cardRef.lastSeen = Date.now();
  cardRef.history.push(knows ? 'know' : 'dontknow');

  if (knows) {
    quizKnow++;
    cardRef.masteredCount++;
    // Check for SRS progression
    if (cardRef.masteredCount >= 5) {
      // Enter SRS schedule
      const srsStep = Math.min(cardRef.history.filter(h => h === 'know').length - 4, SRS_INTERVALS.length - 1);
      const daysUntil = SRS_INTERVALS[Math.max(0, srsStep)] || SRS_INTERVALS[SRS_INTERVALS.length - 1];
      cardRef.nextDue = Date.now() + daysUntil * 86400000;
      showMasteredBanner(cardRef.word);
    }
  } else {
    quizDontknow++;
    // Reset mastered count → back to quiz immediately
    if (cardRef.masteredCount >= 5) {
      cardRef.masteredCount = 0;
      cardRef.nextDue = Date.now();
    } else {
      cardRef.masteredCount = 0;
    }
  }

  saveCards();
  quizIdx++;
  showQuizCard();
  updateQuizStats();
}

function updateQuizStats() {
  const total = quizQueue.length;
  const done = quizIdx;
  document.getElementById('quizProgressFill').style.width = total > 0 ? (done / total * 100) + '%' : '0%';
  document.getElementById('knowCount').textContent = quizKnow;
  document.getElementById('dontknowCount').textContent = quizDontknow;
  document.getElementById('remainCount').textContent = Math.max(0, total - done);
}

function showMasteredBanner(word) {
  const banner = document.getElementById('masteredBanner');
  banner.textContent = `🌟 "${word}" 已掌握！将按间隔重复计划复习。`;
  banner.classList.add('visible');
  setTimeout(() => banner.classList.remove('visible'), 4000);
}

function endQuiz() {
  document.getElementById('quizMain').style.display = 'none';
  document.getElementById('quizDone').classList.add('visible');

  const total = quizQueue.length;
  const rate = total > 0 ? Math.round(quizKnow / total * 100) : 0;
  document.getElementById('quizDoneEmoji').textContent = rate >= 80 ? '🎉' : rate >= 50 ? '💪' : '📖';
  document.getElementById('quizDoneTitle').textContent = `这轮测试完成！`;
  document.getElementById('quizDoneText').textContent = `共 ${total} 张词卡 · 会 ${quizKnow} · 不会 ${quizDontknow} · 正确率 ${rate}%`;
}

// ============ API ============
async function callClaude(prompt) {
  if (settings.apiProvider === 'openai') {
    return callOpenAI(prompt);
  } else {
    return callAnthropic(prompt);
  }
}

async function callAnthropic(prompt) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 600,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || 'API 请求失败');
  }
  const data = await response.json();
  return data.content[0]?.text || '';
}

async function callOpenAI(prompt) {
  const response = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify({
      model: 'gpt-3.5-turbo',
      max_tokens: 600,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || 'API 请求失败');
  }
  const data = await response.json();
  return data.choices[0]?.message?.content || '';
}

// ============ TTS ============
function speakWord(word) {
  if (!word) return;
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(utt);
}

function speakDefinition(text) {
  if (!text) return;
  // 自动检测语言
  let lang = 'en-US';
  if (/[\u4e00-\u9fff]/.test(text)) {
    lang = 'zh-CN'; // 中文
  } else if (/[\u3040-\u309f\u30a0-\u30ff]/.test(text)) {
    lang = 'ja-JP'; // 日文
  } else if (/[\uac00-\ud7af]/.test(text)) {
    lang = 'ko-KR'; // 韩文
  }
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = lang;
  utt.rate = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(utt);
}

// ============ TOAST ============
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
